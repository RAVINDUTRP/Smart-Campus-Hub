spring:
  application:
    name: smart-campus-operations-hub
  config:
    import: optional:file:.env.shared[.properties],optional:file:backend/.env.shared[.properties],optional:file:.env[.properties],optional:file:backend/.env[.properties]
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_ID:}
            client-secret: ${SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_SECRET:}
  profiles:
    default: dev
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 15MB

server:
  port: ${SERVER_PORT:8080}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  security:
    oauth2:
      enabled: ${SECURITY_OAUTH2_ENABLED:false}
      registration-id: ${SECURITY_OAUTH2_REGISTRATION_ID:google}
      backend-base-url: ${BACKEND_BASE_URL:http://localhost:8080}
      frontend-success-url: ${FRONTEND_SUCCESS_URL:http://localhost:5173/}
    rbac:
      admin-emails: ${SECURITY_ADMIN_EMAILS:admin@smartcampus.local}
      technician-emails: ${SECURITY_TECHNICIAN_EMAILS:tech1@smartcampus.local}
  storage:
    ticket-attachments-dir: ${TICKET_ATTACHMENTS_DIR:${java.io.tmpdir}/smart-campus-operations-hub/ticket-attachments}
